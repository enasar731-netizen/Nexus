<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus — Premium Roblox External Overlay</title>
    <link rel="icon" type="image/png" href="/back.png" />
    <meta name="description" content="Nexus is a premium external Roblox overlay featuring smooth ESP, silent aimbot, clean configs, and more." />
    <meta name="author" content="Nexus" />

    <meta property="og:title" content="Nexus — Premium Roblox External Overlay" />
    <meta property="og:description" content="Smooth ESP, Silent Aimbot, Clean Configs. Undetected and built for performance." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Nexus" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body class="bg-background antialiased font-sans">
    <script type="text/javascript">
      // Check for Redirect from 404.html
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
